appId: co.doublenot.simply-suite
productName: Simply Suite
directories:
  output: dist
files:
  - src/**/*
  - package.json
extraResources:
  # The Ruby app (source + standalone vendored gems) → resources/app
  - from: ../
    to: app
    filter:
      - "**/*"
      - "!desktop/**"
      - "!.git/**"
      - "!spec/**"
      - "!docs/**"
      - "!data/**"
      - "!dist/**"
      - "!node_modules/**"
      - "!tailwindcss"
  # The relocatable Ruby runtime → resources/ruby.
  # Exclude msys64: the MSYS2/MinGW *build* toolchain (~1.5-2.5 GB) is only
  # needed to COMPILE native gems on Windows; RubyInstaller ships its runtime
  # DLLs under bin/, so the packaged app runs without it. No-op on Linux/mac
  # (they have no msys64). Keeps the Windows NSIS installer from ballooning past
  # GitHub's release-asset size limit.
  - from: vendor/ruby
    to: ruby
    filter:
      - "**/*"
      - "!msys64/**"
linux:
  target:
    - AppImage
    - deb
  category: Office
mac:
  target:
    - dmg
  category: public.app-category.business
  # Unsigned: never attempt to sign or notarize.
  identity: null
dmg:
  # Two Mac build jobs (arm64, x86_64) publish to one Release — keep names distinct.
  artifactName: ${productName}-${version}-${arch}.${ext}
win:
  target:
    - nsis
nsis:
  # Per-user install (no admin/UAC) — appropriate for an unsigned app.
  oneClick: true
  perMachine: false
publish:
  provider: github
  owner: license2e
  repo: simply-suite
